# kube-prometheus-stack configuration
fullnameOverride: prometheus

# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Service discovery - automatyczne wykrywanie wszystkich serwisów
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/whitelist-source-range: "79.186.58.130/32"
    hosts:
      - prometheus.borowski.services
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.borowski.services

# Grafana configuration
grafana:
  enabled: true
  adminPassword: "3mqrDCPxbstnUROFAVWz"

  persistence:
    enabled: false

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc:3100
      access: proxy
      isDefault: false

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/whitelist-source-range: "79.186.58.130/32"
    hosts:
      - grafana.borowski.services
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.borowski.services

# AlertManager configuration
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# Node metrics
nodeExporter:
  enabled: true

# Kubernetes state metrics
kubeStateMetrics:
  enabled: true

# Prometheus Operator
prometheusOperator:
  enabled: true
